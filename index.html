<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Important Notice</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
    }
    .box {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 24px;
    }
    button {
      margin-top: 20px;
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Before you continue</h1>
    <p>
      The content you are about to view is still a work in progress.
      The information provided has not been confirmed and should not be
      treated as official in any way.
    </p>

    <label>
      <input type="checkbox" id="agree" />
      I understand that this content is a work in progress and is not confirmed or official.
    </label>

    <br />
    <button id="continueBtn" disabled>Continue</button>
  </div>

  <script>
    const checkbox = document.getElementById("agree");
    const button = document.getElementById("continueBtn");

    checkbox.addEventListener("change", () => {
      button.disabled = !checkbox.checked;
    });

    button.addEventListener("click", () => {
      window.location.href = "https://danielvadimobrien.github.io/qr_warning_page/timeline.html";
    });
  </script>
</body>
</html>
